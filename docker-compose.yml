services:
  mysql:
    image: mysql:8.0
    container_name: booking-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hospital_booking
    ports:
      - "3307:3306"
    volumes:
      - booking-mysql-data:/var/lib/mysql

  rabbitmq:
    image: rabbitmq:3-management
    container_name: booking-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  booking-mysql-data:
